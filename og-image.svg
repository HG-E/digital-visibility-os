<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a2318"/>
      <stop offset="50%" style="stop-color:#1A6647"/>
      <stop offset="100%" style="stop-color:#0f3326"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:#2ECC88;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#2ECC88;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="70%" r="40%">
      <stop offset="0%" style="stop-color:#3cb87a;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#3cb87a;stop-opacity:0"/>
    </radialGradient>
    <clipPath id="card-clip">
      <rect x="680" y="110" width="400" height="410" rx="20"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Logo mark -->
  <rect x="80" y="72" width="56" height="56" rx="14" fill="#2ECC88"/>
  <text x="108" y="113" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="30" font-weight="800" fill="white">D</text>

  <!-- Brand name -->
  <text x="152" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="white" letter-spacing="-0.3">DVOS</text>
  <text x="152" y="126" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="rgba(255,255,255,0.5)" letter-spacing="0.5">Digital Visibility OS</text>

  <!-- Free badge -->
  <rect x="80" y="164" width="122" height="28" rx="14" fill="rgba(46,204,136,0.15)" stroke="rgba(46,204,136,0.3)" stroke-width="1"/>
  <circle cx="100" cy="178" r="4" fill="#2ECC88"/>
  <text x="110" y="183" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#2ECC88">Free · No signup</text>

  <!-- Main headline -->
  <text x="80" y="270" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="400" fill="white" letter-spacing="-1.5">Your research</text>
  <text x="80" y="340" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="400" fill="white" letter-spacing="-1.5">deserves to be</text>
  <text x="80" y="410" font-family="Georgia, 'Times New Roman', serif" font-size="64" font-weight="400" fill="#2ECC88" font-style="italic" letter-spacing="-1.5">found.</text>

  <!-- Sub text -->
  <text x="80" y="470" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="400" fill="rgba(255,255,255,0.65)">Track citations · Verify ORCID · Find grants · Build presence</text>

  <!-- Divider -->
  <line x1="80" y1="510" x2="380" y2="510" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

  <!-- URL -->
  <text x="80" y="540" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500" fill="rgba(255,255,255,0.4)">digital-visibility-os.vercel.app</text>

  <!-- Score Card UI Mock -->
  <rect x="680" y="110" width="400" height="410" rx="20" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- Card header -->
  <text x="718" y="158" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="rgba(255,255,255,0.5)" letter-spacing="0.8">VISIBILITY SCORE</text>

  <!-- Score ring -->
  <circle cx="800" cy="258" r="62" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="12"/>
  <circle cx="800" cy="258" r="62" fill="none" stroke="#2ECC88" stroke-width="12"
    stroke-linecap="round" stroke-dasharray="389.6" stroke-dashoffset="100"
    transform="rotate(-90 800 258)"/>
  <text x="800" y="252" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" fill="white">74</text>
  <text x="800" y="272" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="rgba(255,255,255,0.45)">/ 100</text>

  <!-- Signal bars -->
  <text x="718" y="362" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="rgba(255,255,255,0.45)">ORCID</text>
  <rect x="780" y="352" width="230" height="7" rx="4" fill="rgba(255,255,255,0.08)"/>
  <rect x="780" y="352" width="207" height="7" rx="4" fill="#2ECC88"/>
  <text x="1020" y="362" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#2ECC88">90%</text>

  <text x="718" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="rgba(255,255,255,0.45)">Citations</text>
  <rect x="780" y="380" width="230" height="7" rx="4" fill="rgba(255,255,255,0.08)"/>
  <rect x="780" y="380" width="172" height="7" rx="4" fill="#2ECC88"/>
  <text x="1020" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#2ECC88">75%</text>

  <text x="718" y="418" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="rgba(255,255,255,0.45)">Profile</text>
  <rect x="780" y="408" width="230" height="7" rx="4" fill="rgba(255,255,255,0.08)"/>
  <rect x="780" y="408" width="195" height="7" rx="4" fill="#2ECC88"/>
  <text x="1020" y="418" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#2ECC88">85%</text>

  <text x="718" y="446" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="rgba(255,255,255,0.45)">Website</text>
  <rect x="780" y="436" width="230" height="7" rx="4" fill="rgba(255,255,255,0.08)"/>
  <rect x="780" y="436" width="138" height="7" rx="4" fill="#f0c060"/>
  <text x="1020" y="446" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#f0c060">60%</text>

  <!-- Source chips at bottom of card -->
  <rect x="718" y="476" width="90" height="22" rx="11" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="763" y="492" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="rgba(255,255,255,0.55)">OpenAlex</text>
  <rect x="816" y="476" width="64" height="22" rx="11" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="848" y="492" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="rgba(255,255,255,0.55)">ORCID</text>
  <rect x="888" y="476" width="80" height="22" rx="11" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="928" y="492" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="rgba(255,255,255,0.55)">Crossref</text>

  <!-- Bottom data source strip -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(0,0,0,0.25)"/>
  <text x="80" y="611" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.35)">Data: OpenAlex · ORCID · Semantic Scholar · Crossref · PubMed · arXiv · DOAJ · Unpaywall</text>
</svg>
